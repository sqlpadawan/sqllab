<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>sqllab.local network topology</title>
  <desc>Hyper-V lab network diagram showing two simulated data centers (DC-A and DC-B) connected via RRAS on sqllabdc01, with four SQL servers, one workstation, and internet access through an external vSwitch.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .th  { font-size: 14px; font-weight: 500; fill: #3C3489; }
      .ts  { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .th-teal   { font-size: 14px; font-weight: 500; fill: #085041; }
      .ts-teal   { font-size: 12px; font-weight: 400; fill: #0F6E56; }
      .th-blue   { font-size: 14px; font-weight: 500; fill: #0C447C; }
      .ts-blue   { font-size: 12px; font-weight: 400; fill: #185FA5; }
      .th-coral  { font-size: 14px; font-weight: 500; fill: #712B13; }
      .ts-coral  { font-size: 12px; font-weight: 400; fill: #993C1D; }
      .th-gray   { font-size: 14px; font-weight: 500; fill: #444441; }
      .ts-muted  { font-size: 12px; font-weight: 400; fill: #888780; }
    </style>
  </defs>

  <!-- ── Internet ── -->
  <rect x="250" y="20" width="180" height="40" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th-gray" x="340" y="40" text-anchor="middle" dominant-baseline="central">Internet</text>

  <!-- Internet → DC (dashed) -->
  <line x1="340" y1="60" x2="340" y2="110" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- ── sqllabdc01 ── -->
  <rect x="200" y="110" width="280" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="131" text-anchor="middle" dominant-baseline="central">sqllabdc01</text>
  <text class="ts" x="340" y="151" text-anchor="middle" dominant-baseline="central" fill="#534AB7">DC · DNS · RRAS · 172.16.10.10</text>

  <!-- ── DC-A container ── -->
  <rect x="30" y="220" width="310" height="340" rx="16" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="6 3"/>
  <text class="ts-muted" x="185" y="244" text-anchor="middle">DC-A · 172.16.10.0/24</text>

  <!-- ── DC-B container ── -->
  <rect x="360" y="220" width="290" height="340" rx="16" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="6 3"/>
  <text class="ts-muted" x="505" y="244" text-anchor="middle">DC-B · 192.168.10.0/24</text>

  <!-- DC → DC-A spine -->
  <line x1="280" y1="166" x2="185" y2="278" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <!-- DC → DC-B spine -->
  <line x1="400" y1="166" x2="505" y2="278" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- ── sqlwork01 ── -->
  <rect x="50" y="278" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-teal" x="140" y="299" text-anchor="middle" dominant-baseline="central">sqlwork01</text>
  <text class="ts-teal" x="140" y="319" text-anchor="middle" dominant-baseline="central">Workstation · 172.16.10.20</text>

  <!-- ── sqlsrv01 ── -->
  <rect x="50" y="370" width="180" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th-blue" x="140" y="391" text-anchor="middle" dominant-baseline="central">sqlsrv01</text>
  <text class="ts-blue" x="140" y="411" text-anchor="middle" dominant-baseline="central">SQL · 172.16.10.101</text>

  <!-- ── sqlsrv02 ── -->
  <rect x="50" y="460" width="180" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th-blue" x="140" y="481" text-anchor="middle" dominant-baseline="central">sqlsrv02</text>
  <text class="ts-blue" x="140" y="501" text-anchor="middle" dominant-baseline="central">SQL · 172.16.10.102</text>

  <!-- ── sqlsrv03 ── -->
  <rect x="380" y="370" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th-coral" x="470" y="391" text-anchor="middle" dominant-baseline="central">sqlsrv03</text>
  <text class="ts-coral" x="470" y="411" text-anchor="middle" dominant-baseline="central">SQL · 192.168.10.101</text>

  <!-- ── sqlsrv04 ── -->
  <rect x="380" y="460" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th-coral" x="470" y="481" text-anchor="middle" dominant-baseline="central">sqlsrv04</text>
  <text class="ts-coral" x="470" y="501" text-anchor="middle" dominant-baseline="central">SQL · 192.168.10.102</text>

  <!-- DC-A internal connections -->
  <line x1="185" y1="278" x2="140" y2="334" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="185" y1="278" x2="140" y2="370" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="185" y1="278" x2="140" y2="460" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- DC-B internal connections -->
  <line x1="505" y1="278" x2="470" y2="370" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="505" y1="278" x2="470" y2="460" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- ── Host vSwitch bar ── -->
  <rect x="160" y="570" width="360" height="36" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 2"/>
  <text class="ts-muted" x="340" y="591" text-anchor="middle" dominant-baseline="central">Hyper-V host · sqllab-internal vSwitch · 172.16.10.1</text>

  <!-- ── Legend ── -->
  <rect x="562" y="458" width="12" height="12" rx="2" fill="#534AB7" opacity="0.7"/>
  <text class="ts-muted" x="580" y="469">DC / RRAS</text>
  <rect x="562" y="478" width="12" height="12" rx="2" fill="#1D9E75" opacity="0.7"/>
  <text class="ts-muted" x="580" y="489">Workstation</text>
  <rect x="562" y="498" width="12" height="12" rx="2" fill="#378ADD" opacity="0.7"/>
  <text class="ts-muted" x="580" y="509">SQL (DC-A)</text>
  <rect x="562" y="518" width="12" height="12" rx="2" fill="#D85A30" opacity="0.7"/>
  <text class="ts-muted" x="580" y="529">SQL (DC-B)</text>

</svg>
